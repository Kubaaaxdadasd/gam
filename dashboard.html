<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect - Feed</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; }
        nav { background: #1e293b; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }
        .post-box { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; background: #334155; border: none; color: white; padding: 10px; border-radius: 5px; height: 80px; }
        .btn { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .post { background: #1e293b; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid #22c55e; }
        .logout-btn { background: #ef4444; font-size: 0.8rem; }
    </style>
</head>
<body>

<nav>
    <strong>⚽ Football Portal</strong>
    <button id="logoutBtn" class="btn logout-btn">Wyloguj</button>
</nav>

<div class="container">
    <div class="post-box">
        <textarea id="postInput" placeholder="Co tam w świecie piłki? Opisz transfer lub akcję!"></textarea>
        <button id="addPostBtn" class="btn">Opublikuj Post</button>
    </div>

    <div id="postsFeed">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0NGpFKoH7jru7Uz_1PDT_6Oj7XY7m0IQ",
        authDomain: "footballportal-c05b3.firebaseapp.com",
        projectId: "footballportal-c05b3",
        storageBucket: "footballportal-c05b3.firebasestorage.app",
        appId: "1:445132841755:web:fee5c072ba2c3f8355a9be"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 1. Sprawdzanie czy użytkownik jest zalogowany
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "logowanie.html";
        }
    });

    // 2. Dodawanie posta do Firestore
    document.getElementById('addPostBtn').onclick = async () => {
        const text = document.getElementById('postInput').value;
        if (text.trim() === "") return;

        await addDoc(collection(db, "posts"), {
            content: text,
            author: auth.currentUser.email,
            createdAt: serverTimestamp()
        });
        document.getElementById('postInput').value = "";
    };

    // 3. Pobieranie postów w czasie rzeczywistym
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('postsFeed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const post = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <small style="color: #94a3b8;">${post.author}</small>
                    <p>${post.content}</p>
                </div>
            `;
        });
    });

    // 4. Wylogowanie
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    if (!user) {
    window.location.href = "index.html"; // Jeśli nie ma usera, wracamy do bramy
}
</script>

</body>
</html>
