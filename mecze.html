<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Football Dashboard - Test Mode</title>
    <style>
        :root { --blue: #0047ff; --dark: #0a0a0a; --card: #141414; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Tło boiska */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center;
               background-size: cover; z-index: -1; }

        .container { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; height: fit-content; }
        
        /* Styl listy meczów */
        .match-box { background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .match-header { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
        .match-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: var(--blue); font-weight: bold; font-size: 20px; }

        /* BOISKO - Naprawione pozycjonowanie */
        .details { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .details.active { display: block; }
        
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            aspect-ratio: 16/9; 
            border: 1px solid #444; 
            display: flex; 
        }
        .half { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; }
        .player { font-size: 12px; margin: 3px 0; display: flex; gap: 8px; }
        .num { color: var(--blue); font-weight: bold; width: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="panel"><h3>Top Oceny</h3><div id="ratings">Ładowanie...</div></div>
        
        <div id="matches-list">
            </div>

        <div class="panel"><h3>Top Strzelcy</h3><div id="scorers">
            <div class="player"><span class="num">1</span> Haaland (18)</div>
            <div class="player"><span class="num">2</span> Lewandowski (15)</div>
        </div></div>
    </div>

<script>
const KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

async function init() {
    await fetchLiveMatches();
    fetchTopRatings();
}

async function fetchLiveMatches() {
    const container = document.getElementById('matches-col') || document.getElementById('center-col');
    try {
        const res = await fetch(`https://${HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        let events = data.events || [];

        // Tryb awaryjny: jeśli API nie zwraca meczów, dodajemy testowy
        if (events.length === 0) {
            events = [{
                id: "test_match",
                tournament: { name: "PREMIER LEAGUE (MECZ TESTOWY)" },
                homeTeam: { name: "Bournemouth" },
                awayTeam: { name: "Man Utd" },
                homeScore: { current: 0 },
                awayScore: { current: 0 }
            }];
        }
        renderMatches(events, container);
    } catch (e) {
        container.innerHTML = "Błąd połączenia z API.";
    }
}

function renderMatches(events, container) {
    container.innerHTML = events.map(m => `
        <div class="match-card" style="background:#141414; border:1px solid #222; margin-bottom:10px; border-radius:12px; overflow:hidden;">
            <div style="padding:10px; font-size:10px; color:gray; background:rgba(255,255,255,0.02);">${m.tournament.name}</div>
            <div onclick="toggleDetails('${m.id}')" style="padding:15px; display:flex; justify-content:space-between; cursor:pointer;">
                <span>${m.homeTeam.name}</span>
                <span style="color:#0047ff; font-weight:bold;">${m.homeScore.current} - ${m.awayScore.current}</span>
                <span>${m.awayTeam.name}</span>
            </div>
            <div id="details-${m.id}" style="display:none; padding:10px; background:#000;">
                <div class="pitch" style="background:url('boisko.jpg') no-repeat center; background-size:cover; aspect-ratio:16/9; display:flex; border:1px solid #333;">
                    <div id="home-${m.id}" style="flex:1; padding:10px; background:rgba(0,0,0,0.5);"></div>
                    <div id="away-${m.id}" style="flex:1; padding:10px; background:rgba(0,0,0,0.5); text-align:right;"></div>
                </div>
            </div>
        </div>
    `).join('');
}

async function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    
    if (id === "test_match") {
        fillLineup(`home-${id}`, ["Neto", "Smith", "Cook", "Solanke"]);
        fillLineup(`away-${id}`, ["Onana", "Dalot", "Mainoo", "Hojlund"], true);
    } else {
        fetchActualLineup(id);
    }
}

function fillLineup(containerId, players, isAway = false) {
    document.getElementById(containerId).innerHTML = players.map((p, i) => `
        <div style="font-size:11px; margin:2px 0; display:flex; ${isAway ? 'flex-direction:row-reverse' : ''}">
            <span style="color:#0047ff; font-weight:bold; width:20px;">${i+1}</span>
            <span>${p}</span>
        </div>
    `).join('');
}

async function fetchTopRatings() {
    const list = document.getElementById('ratings-list') || document.getElementById('ratings');
    try {
        const res = await fetch(`https://${HOST}/api/v1/unique-tournament/17/season/61627/statistics?type=rating&count=5`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        list.innerHTML = data.statistics.map(s => `
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:12px;">
                <span>${s.player.name}</span>
                <span style="background:#00d24d; color:black; padding:2px 4px; border-radius:3px; font-weight:bold;">${s.rating.toFixed(1)}</span>
            </div>
        `).join('');
    } catch (e) { list.innerHTML = "Brak danych (limit API)."; }
}

init();
</script>
</body>
</html>
