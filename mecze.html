<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Football Dashboard - Test Mode</title>
    <style>
        :root { --blue: #0047ff; --dark: #0a0a0a; --card: #141414; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Tło boiska */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center;
               background-size: cover; z-index: -1; }

        .container { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; height: fit-content; }
        
        /* Styl listy meczów */
        .match-box { background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .match-header { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
        .match-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: var(--blue); font-weight: bold; font-size: 20px; }

        /* BOISKO - Naprawione pozycjonowanie */
        .details { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .details.active { display: block; }
        
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            aspect-ratio: 16/9; 
            border: 1px solid #444; 
            display: flex; 
        }
        .half { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; }
        .player { font-size: 12px; margin: 3px 0; display: flex; gap: 8px; }
        .num { color: var(--blue); font-weight: bold; width: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="panel"><h3>Top Oceny</h3><div id="ratings">Ładowanie...</div></div>
        
        <div id="matches-list">
            </div>

        <div class="panel"><h3>Top Strzelcy</h3><div id="scorers">
            <div class="player"><span class="num">1</span> Haaland (18)</div>
            <div class="player"><span class="num">2</span> Lewandowski (15)</div>
        </div></div>
    </div>

<script>
const KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

function injectStyles() {
    const style = document.createElement('style');
    style.innerHTML = `
        .match-card { background: #141414; border: 1px solid #333; border-radius: 12px; margin: 20px auto; max-width: 900px; color: white; font-family: sans-serif; overflow: hidden; }
        .match-info { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #1a1a1a; }
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: 100% 100%; 
            aspect-ratio: 16/9; 
            display: flex; 
            border-top: 2px solid #333;
        }
        /* Kluczowa zmiana: dodajemy szeroki padding, żeby odsunąć tekst od bramek */
        .half { 
            flex: 1; 
            padding: 40px 60px; 
            background: rgba(0,0,0,0.4); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        .player-item { display: flex; gap: 10px; font-size: 13px; margin: 6px 0; text-shadow: 1px 1px 2px black; }
        .p-num { color: #0047ff; font-weight: bold; width: 25px; text-align: center; background: rgba(255,255,255,0.1); border-radius: 3px; }
    `;
    document.head.appendChild(style);
}

async function init() {
    injectStyles();
    const main = document.getElementById('matches-col') || document.body;
    
    try {
        const res = await fetch(`https://${HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        let matches = data.events || [];

        if (matches.length === 0) {
            matches = [{
                id: "test_1",
                tournament: { name: "PREMIER LEAGUE (TRYB TESTOWY)" },
                homeTeam: { name: "Bournemouth" },
                awayTeam: { name: "Man Utd" },
                homeScore: { current: 1 },
                awayScore: { current: 2 }
            }];
        }
        
        main.innerHTML = matches.map(m => `
            <div class="match-card">
                <div style="padding: 10px; font-size: 11px; color: #888; text-align: center;">${m.tournament.name}</div>
                <div class="match-info" onclick="togglePitch('${m.id}')">
                    <span style="flex:1; font-weight:bold;">${m.homeTeam.name}</span>
                    <span style="color:#0047ff; font-weight:900; font-size:24px; min-width:80px; text-align:center;">${m.homeScore.current} - ${m.awayScore.current}</span>
                    <span style="flex:1; text-align:right; font-weight:bold;">${m.awayTeam.name}</span>
                </div>
                <div id="p-box-${m.id}" style="display:none;">
                    <div class="pitch">
                        <div id="home-l-${m.id}" class="half"></div>
                        <div id="away-l-${m.id}" class="half" style="text-align:right"></div>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (e) { main.innerHTML = "Błąd API."; }
}

async function togglePitch(id) {
    const box = document.getElementById(`p-box-${id}`);
    box.style.display = box.style.display === "none" ? "block" : "none";

    if (id === "test_1") {
        renderPlayers(`home-l-${id}`, ["Neto", "Smith", "Cook", "Solanke", "Tavernier", "Kluivert"]);
        renderPlayers(`away-l-${id}`, ["Onana", "Dalot", "Mainoo", "Fernandes", "Rashford", "Hojlund"], true);
    }
}

function renderPlayers(divId, names, reverse = false) {
    document.getElementById(divId).innerHTML = names.map((n, i) => `
        <div class="player-item" style="${reverse ? 'flex-direction:row-reverse' : ''}">
            <span class="p-num">${i + 1}</span> <span>${n}</span>
        </div>
    `).join('');
}

init();
</script>
</body>
</html>
