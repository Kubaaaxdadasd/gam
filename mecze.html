<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect Live</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --sofa-blue: #0047ff;
            --text-gray: #aaa;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
            --border: 1px solid rgba(255,255,255,0.05);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Tło z boiskiem w tle strony */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('boisko.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        nav { background: var(--sofa-blue); padding: 0 20px; display: flex; height: 50px; align-items: center; gap: 30px; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .sidebar-panel { background: var(--card-bg); border-radius: 12px; padding: 15px; border: var(--border); }
        .sidebar-panel h3 { font-size: 0.7rem; color: var(--sofa-blue); text-transform: uppercase; margin: 0 0 15px 0; border-bottom: var(--border); padding-bottom: 8px; }

        .side-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .side-rank { width: 20px; color: var(--text-gray); font-size: 0.7rem; }
        .side-info { flex: 1; margin-left: 10px; }
        .side-name { display: block; font-size: 0.85rem; font-weight: 600; }
        .side-sub { font-size: 0.7rem; color: var(--text-gray); }
        .side-val { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; min-width: 35px; text-align: center; }
        .val-rate { background: var(--rating-green); color: black; }
        .val-goal { background: #333; color: white; }

        /* Mecze w środkowej kolumnie */
        .match-card { background: var(--card-bg); border-radius: 12px; border: var(--border); margin-bottom: 15px; overflow: hidden; }
        .league-title { padding: 10px 15px; font-size: 0.7rem; color: var(--text-gray); background: rgba(255,255,255,0.02); font-weight: bold; }
        .match-row { padding: 15px; display: flex; align-items: center; cursor: pointer; transition: background 0.2s; }
        .match-row:hover { background: rgba(255,255,255,0.05); }
        .m-status { width: 50px; color: var(--accent-red); font-weight: 800; font-size: 0.7rem; }
        .m-teams { flex: 1; font-weight: 600; font-size: 0.9rem; }
        .m-score { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: 800; color: var(--sofa-blue); }

        /* Detale meczu i BOISKO */
        .match-details { display: none; background: #0c0c0c; padding: 15px; border-top: var(--border); }
        .match-details.active { display: block; }
        .tabs { display: flex; gap: 20px; margin-bottom: 15px; border-bottom: 1px solid #222; }
        .tab { padding: 8px 0; font-size: 0.7rem; color: var(--text-gray); cursor: pointer; text-transform: uppercase; font-weight: 800; }
        .tab.active { color: var(--sofa-blue); border-bottom: 2px solid var(--sofa-blue); }

        .pitch-container {
            background: url('boisko.jpg') no-repeat center;
            background-size: cover;
            aspect-ratio: 16 / 9; /* Zachowuje proporcje poziomego boiska */
            border-radius: 8px;
            position: relative;
            border: 1px solid #333;
            display: flex;
        }
        .pitch-half {
            flex: 1;
            padding: 15px;
            background: rgba(0,0,0,0.4); /* Przyciemnienie, żeby nazwiska były czytelne */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .player-row { font-size: 0.75rem; margin: 4px 0; display: flex; align-items: center; gap: 10px; }
        .p-num { color: var(--sofa-blue); font-weight: bold; width: 20px; }
        .p-name { color: white; }

        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } .sidebar-panel { display: none; } }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<nav>
    <a href="#">Home</a>
    <a href="#" style="border-bottom: 2px solid white;">Mecze</a>
    <a href="#">Wiadomości</a>
</nav>

<div class="main-grid">
    <aside class="sidebar-panel">
        <h3>Top Oceny</h3>
        <select id="ratingSelect" onchange="loadTopRatings()" style="width:100%; background:#1a1a1a; color:white; border:1px solid #333; padding:6px; border-radius:4px; font-size:0.75rem; margin-bottom:10px;">
            <option value="pl">Premier League</option>
            <option value="cl">Champions League</option>
            <option value="ek">Ekstraklasa</option>
        </select>
        <div id="ratings-list"></div>
    </aside>

    <main id="center-col">
        <div id="live-matches-container">Ładowanie meczów na żywo...</div>
    </main>

    <aside class="sidebar-panel">
        <h3>Top Strzelcy</h3>
        <div id="scorers-list"></div>
    </aside>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const API_HOST = 'sportapi7.p.rapidapi.com';

const CONFIG = {
    pl: { tid: 17, sid: 61627 },
    cl: { tid: 7, sid: 63842 },
    ek: { tid: 106, sid: 61971 }
};

// 1. POBIERANIE MECZÓW
async function fetchMatches() {
    try {
        const res = await fetch(`https://${API_HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        renderMatches(data.events || []);
    } catch (e) {
        document.getElementById('live-matches-container').innerHTML = "Błąd połączenia z API.";
    }
}

function renderMatches(events) {
    const container = document.getElementById('live-matches-container');
    if(events.length === 0) {
        container.innerHTML = "<div class='match-card' style='padding:20px; text-align:center;'>Brak meczów na żywo.</div>";
        return;
    }

    const leagues = {};
    events.forEach(e => {
        const name = e.tournament.name;
        if(!leagues[name]) leagues[name] = [];
        leagues[name].push(e);
    });

    container.innerHTML = Object.keys(leagues).map(l => `
        <div class="match-card">
            <div class="league-title">${l}</div>
            ${leagues[l].map(m => `
                <div class="match-row" onclick="toggleDetails(${m.id})">
                    <div class="m-status">LIVE</div>
                    <div class="m-teams"><div>${m.homeTeam.name}</div><div>${m.awayTeam.name}</div></div>
                    <div class="m-score">${m.homeScore.current} - ${m.awayScore.current}</div>
                </div>
                <div id="details-${m.id}" class="match-details">
                    <div class="tabs">
                        <div class="tab active" onclick="loadLineups(${m.id})">Składy</div>
                        <div class="tab">Statystyki</div>
                    </div>
                    <div id="content-${m.id}">Kliknij "Składy", aby załadować...</div>
                </div>
            `).join('')}
        </div>
    `).join('');
}

// 2. POBIERANIE SKŁADÓW (NAPRAWIONE)
async function loadLineups(id) {
    const content = document.getElementById(`content-${id}`);
    content.innerHTML = "Pobieranie składów...";

    try {
        const res = await fetch(`https://${API_HOST}/api/v1/event/${id}/lineups`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();

        if(!data.home || !data.away) {
            content.innerHTML = "<center style='padding:20px;'>Składy będą dostępne 60 min przed meczem.</center>";
            return;
        }

        content.innerHTML = `
            <div class="pitch-container">
                <div class="pitch-half">
                    <div style="color:var(--sofa-blue); font-weight:bold; margin-bottom:10px;">DOM</div>
                    ${data.home.players.slice(0,11).map(p => `
                        <div class="player-row"><span class="p-num">${p.shirtNumber}</span><span class="p-name">${p.player.name}</span></div>
                    `).join('')}
                </div>
                <div class="pitch-half" style="text-align:right;">
                    <div style="color:var(--accent-red); font-weight:bold; margin-bottom:10px;">GOŚĆ</div>
                    ${data.away.players.slice(0,11).map(p => `
                        <div class="player-row" style="flex-direction:row-reverse;"><span class="p-num" style="color:var(--accent-red)">${p.shirtNumber}</span><span class="p-name">${p.player.name}</span></div>
                    `).join('')}
                </div>
            </div>
        `;
    } catch (e) {
        content.innerHTML = "Błąd API podczas pobierania składów.";
    }
}

// 3. PANELE BOCZNE
async function loadTopRatings() {
    const league = document.getElementById('ratingSelect').value;
    const { tid, sid } = CONFIG[league];
    const list = document.getElementById('ratings-list');
    list.innerHTML = "Ładowanie...";

    try {
        const res = await fetch(`https://${API_HOST}/api/v1/unique-tournament/${tid}/season/${sid}/statistics?type=rating&count=5`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        list.innerHTML = (data.statistics || []).map((p, i) => `
            <div class="side-item">
                <div class="side-rank">${i+1}</div>
                <div class="side-info"><span class="side-name">${p.player.name}</span><span class="side-sub">${p.team.name}</span></div>
                <div class="side-val val-rate">${p.rating.toFixed(2)}</div>
            </div>
        `).join('');
    } catch (e) { list.innerHTML = "Błąd danych."; }
}

function renderScorers() {
    const data = [
        { name: "Erling Haaland", team: "Man City", val: 18 },
        { name: "Robert Lewandowski", team: "Barcelona", val: 15 },
        { name: "Harry Kane", team: "Bayern", val: 14 },
        { name: "Mo Salah", team: "Liverpool", val: 14 }
    ];
    document.getElementById('scorers-list').innerHTML = data.map((p, i) => `
        <div class="side-item">
            <div class="side-rank">${i+1}</div>
            <div class="side-info"><span class="side-name">${p.name}</span><span class="side-sub">${p.team}</span></div>
            <div class="side-val val-goal">${p.val}</div>
        </div>
    `).join('');
}

function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    const active = el.classList.contains('active');
    document.querySelectorAll('.match-details').forEach(d => d.classList.remove('active'));
    if(!active) {
        el.classList.add('active');
        loadLineups(id);
    }
}

// START
fetchMatches();
loadTopRatings();
renderScorers();
setInterval(fetchMatches, 60000);
</script>
</body>
</html>
