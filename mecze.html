<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect PRO - Live</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --sofa-blue: #0047ff;
            --text-gray: #aaa;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
            --border: 1px solid rgba(255,255,255,0.1);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('boisko.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* --- LAYOUT --- */
        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .sidebar-panel { background: var(--card-bg); border: var(--border); border-radius: 12px; padding: 15px; height: fit-content; }

        /* --- MECZE I ROZWIJANIE --- */
        .match-card { background: var(--card-bg); border-radius: 12px; border: var(--border); margin-bottom: 10px; overflow: hidden; }
        .league-title { background: #1a1a1a; padding: 10px 15px; font-size: 0.75rem; font-weight: 800; color: var(--text-gray); }
        
        .match-row { 
            display: flex; align-items: center; padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .match-row:hover { background: rgba(255,255,255,0.05); }
        
        .m-time { width: 40px; color: var(--accent-red); font-size: 0.7rem; font-weight: 800; }
        .m-teams { flex: 1; font-size: 0.9rem; font-weight: 600; }
        .m-score { width: 40px; text-align: right; color: var(--sofa-blue); font-weight: 800; font-size: 1.1rem; }

        /* --- PANEL SZCZEGÓŁÓW (UKRYTY DOMYŚLNIE) --- */
        .match-details { 
            display: none; 
            background: #0d0d0d; 
            border-top: 1px solid #222; 
            padding: 20px;
        }
        .match-details.active { display: block; }

        .tabs { display: flex; gap: 10px; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tab { 
            padding: 8px 12px; font-size: 0.7rem; cursor: pointer; color: var(--text-gray); 
            text-transform: uppercase; font-weight: 700; 
        }
        .tab.active { color: var(--sofa-blue); border-bottom: 2px solid var(--sofa-blue); }

        /* --- CONTENT W TABACH --- */
        .tab-content { font-size: 0.8rem; }
        .event-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .event-icon { width: 15px; height: 15px; border-radius: 3px; }
        
        /* Mini boisko w składach */
        .mini-pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; height: 200px; border-radius: 8px; 
            position: relative; margin-top: 10px; opacity: 0.8;
        }

        .stat-bar-container { margin-bottom: 10px; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; }
        .stat-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; display: flex; }
        .bar-home { background: var(--sofa-blue); height: 100%; }
        .bar-away { background: white; height: 100%; }

        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .sidebar-panel { display: none; } }
    </style>
</head>
<body>

<div class="main-grid">
    <aside class="sidebar-panel">
        <h4 style="font-size: 0.7rem; color: var(--text-gray);">TOP OCENY</h4>
        <div id="ratings"></div>
    </aside>

    <main id="match-list">
        </main>

    <aside class="sidebar-panel">
        <h4 style="font-size: 0.7rem; color: var(--text-gray);">TOP STRZELCY</h4>
        <div id="scorers"></div>
    </aside>
</div>

<script>
// Przykładowe dane meczu do rozwinięcia
const matches = [
    { id: 1, league: "Premier League", home: "Bournemouth", away: "Man Utd", score: "1:2", time: "72'" },
    { id: 2, league: "Ekstraklasa", home: "Lech Poznań", away: "Legia Warszawa", score: "0:0", time: "15'" }
];

function renderMatches() {
    const container = document.getElementById('match-list');
    container.innerHTML = matches.map(m => `
        <div class="match-card">
            <div class="league-title">${m.league}</div>
            <div class="match-row" onclick="toggleDetails(${m.id})">
                <div class="m-time">${m.time}</div>
                <div class="m-teams">
                    <div>${m.home}</div>
                    <div>${m.away}</div>
                </div>
                <div class="m-score">${m.score}</div>
            </div>
            
            <div id="details-${m.id}" class="match-details">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab(event, ${m.id}, 'info')">Szczegóły</div>
                    <div class="tab" onclick="switchTab(event, ${m.id}, 'lineups')">Składy</div>
                    <div class="tab" onclick="switchTab(event, ${m.id}, 'stats')">Statystyki</div>
                </div>
                
                <div id="content-${m.id}" class="tab-content">
                    <div class="event-line">⚽ <b>24'</b> Marcus Rashford (Asysta: Bruno)</div>
                    <div class="event-line">⚽ <b>55'</b> Justin Kluivert (Karny)</div>
                    <div class="event-line">🟨 <b>62'</b> Lisandro Martinez</div>
                </div>
            </div>
        </div>
    `).join('');
}

function toggleDetails(id) {
    const el = document.getElementById(`details-${id}`);
    const isVisible = el.style.display === 'block';
    // Zamknij inne jeśli chcesz styl SofaScore (opcjonalnie)
    el.style.display = isVisible ? 'none' : 'block';
}

function switchTab(event, id, type) {
    event.stopPropagation(); // Żeby nie zamknęło okna przy kliku w tab
    const content = document.getElementById(`content-${id}`);
    
    // Zmiana aktywnego taba
    const tabs = event.target.parentElement.querySelectorAll('.tab');
    tabs.forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    if(type === 'info') {
        content.innerHTML = `
            <div class="event-line">⚽ <b>24'</b> Marcus Rashford</div>
            <div class="event-line">⚽ <b>55'</b> Justin Kluivert</div>
        `;
    } else if(type === 'lineups') {
        content.innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>4-2-3-1</span><span>4-3-3</span>
            </div>
            <div class="mini-pitch">
                <div style="position:absolute; top:80px; left:20px; background:red; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>
                <div style="position:absolute; top:80px; right:20px; background:blue; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>
            </div>
            <p style="text-align:center; font-size:0.6rem; color:gray; margin-top:5px;">Kliknij boisko, aby zobaczyć pełną analizę</p>
        `;
    } else if(type === 'stats') {
        content.innerHTML = `
            <div class="stat-bar-container">
                <div class="stat-label"><span>Posiadanie piłki</span><span>45% - 55%</span></div>
                <div class="stat-bar"><div class="bar-home" style="width:45%"></div><div class="bar-away" style="width:55%"></div></div>
            </div>
            <div class="stat-bar-container">
                <div class="stat-label"><span>Strzały celne</span><span>3 - 6</span></div>
                <div class="stat-bar"><div class="bar-home" style="width:33%"></div><div class="bar-away" style="width:66%"></div></div>
            </div>
        `;
    }
}

// Inicjalizacja
renderMatches();
</script>
</body>
</html>
