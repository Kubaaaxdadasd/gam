<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Football Dashboard - Test Mode</title>
    <style>
        :root { --blue: #0047ff; --dark: #0a0a0a; --card: #141414; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Tło boiska */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center;
               background-size: cover; z-index: -1; }

        .container { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; height: fit-content; }
        
        /* Styl listy meczów */
        .match-box { background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .match-header { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
        .match-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: var(--blue); font-weight: bold; font-size: 20px; }

        /* BOISKO - Naprawione pozycjonowanie */
        .details { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .details.active { display: block; }
        
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            aspect-ratio: 16/9; 
            border: 1px solid #444; 
            display: flex; 
        }
        .half { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; }
        .player { font-size: 12px; margin: 3px 0; display: flex; gap: 8px; }
        .num { color: var(--blue); font-weight: bold; width: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="panel"><h3>Top Oceny</h3><div id="ratings">Ładowanie...</div></div>
        
        <div id="matches-list">
            </div>

        <div class="panel"><h3>Top Strzelcy</h3><div id="scorers">
            <div class="player"><span class="num">1</span> Haaland (18)</div>
            <div class="player"><span class="num">2</span> Lewandowski (15)</div>
        </div></div>
    </div>

<script>
const KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

// FUNKCJA STARTOWA
async function init() {
    renderMatches(); // Renderuj mecze (w tym testowy)
    fetchTopPlayers(); // Pobierz oceny
}

function renderMatches() {
    const list = document.getElementById('matches-list');
    
    // Dodajemy "Mecz Testowy", żebyś zawsze miał w co kliknąć
    const testMatch = {
        id: "demo",
        home: "Bournemouth",
        away: "Man Utd",
        score: "0 - 0"
    };

    list.innerHTML = `
        <div class="match-box" onclick="toggleDetails('demo')">
            <div class="match-header">PREMIER LEAGUE - TRYB TESTOWY</div>
            <div class="match-body">
                <span>${testMatch.home}</span>
                <span class="score">${testMatch.score}</span>
                <span>${testMatch.away}</span>
            </div>
            <div id="det-demo" class="details">
                <div class="pitch">
                    <div class="half" id="home-lineup">Pobieranie...</div>
                    <div class="half" id="away-lineup" style="text-align:right">Pobieranie...</div>
                </div>
            </div>
        </div>
    `;
}

async function toggleDetails(id) {
    const el = document.getElementById(`det-${id}`);
    el.classList.toggle('active');
    
    if(id === "demo") {
        // Symulacja danych dla meczu testowego
        showLineup("home-lineup", ["Neto", "Smith", "Zabarnyi", "Senesi", "Kelly", "Cook", "Christie", "Kluivert", "Semenyo", "Tavernier", "Solanke"]);
        showLineup("away-lineup", ["Onana", "Dalot", "Maguire", "Kambwala", "Wan-Bissaka", "Casemiro", "Mainoo", "Garnacho", "Fernandes", "Rashford", "Hojlund"], true);
    }
}

function showLineup(containerId, players, reverse = false) {
    const container = document.getElementById(containerId);
    container.innerHTML = players.map((p, i) => `
        <div class="player" style="${reverse ? 'flex-direction:row-reverse' : ''}">
            <span class="num">${i+1}</span> <span>${p}</span>
        </div>
    `).join('');
}

async function fetchTopPlayers() {
    try {
        const res = await fetch(`https://${HOST}/api/v1/unique-tournament/17/season/61627/statistics?type=rating&count=5`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        document.getElementById('ratings').innerHTML = data.statistics.map(s => `
            <div class="player" style="margin-bottom:8px">
                <span class="num" style="background: #00d24d; color:black; padding:2px 5px; border-radius:3px">${s.rating.toFixed(1)}</span>
                ${s.player.name}
            </div>
        `).join('');
    } catch(e) {
        document.getElementById('ratings').innerHTML = "Błąd API lub limit wygasł.";
    }
}

init();
</script>
</body>
</html>
