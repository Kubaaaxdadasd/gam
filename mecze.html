<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect - SofaStyle</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --sofa-blue: #0047ff;
            --text-gray: #b0b0b0;
            --accent: #ff0046;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: var(--bg-dark);
            color: white;
            /* Próba załadowania tła, jeśli plik istnieje */
            background-image: linear-gradient(rgba(18, 18, 18, 0.8), rgba(18, 18, 18, 0.8)), url('boisko.jpg');
            background-attachment: fixed;
            background-size: cover;
        }

        nav { background: var(--sofa-blue); padding: 1rem; display: flex; gap: 20px; font-weight: bold; }
        nav a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        nav a:hover { opacity: 1; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* Spotkanie Dnia */
        .featured-match {
            background: var(--card-dark);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .featured-title { color: var(--sofa-blue); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 15px; }
        .featured-teams { display: flex; justify-content: space-around; align-items: center; font-size: 1.5rem; font-weight: 800; }

        /* Nagłówki Lig */
        .league-group { margin-bottom: 20px; }
        .league-header { 
            background: #2a2a2a; 
            padding: 10px 15px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        /* Karty meczów w grupach */
        .match-row { 
            background: var(--card-dark); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: background 0.2s;
        }
        .match-row:last-child { border-radius: 0 0 8px 8px; border-bottom: none; }
        .match-row:hover { background: #252525; }
        
        .m-time { flex: 0 0 50px; font-size: 0.75rem; color: var(--text-gray); }
        .m-teams { flex: 1; display: flex; flex-direction: column; gap: 5px; font-size: 0.95rem; }
        .m-score { flex: 0 0 40px; text-align: right; font-weight: bold; font-family: monospace; font-size: 1.1rem; }
        .live-tag { color: var(--accent); font-size: 0.7rem; font-weight: bold; }

        .details-panel { display: none; background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
    </style>
</head>
<body>

<nav>
    <a href="#">Wszystkie</a>
    <a href="#">Ulubione</a>
    <a href="#">Kursy</a>
</nav>

<div class="container" id="main-content">
    <div id="featured-section"></div>
    <div id="leagues-container">Ładowanie meczów...</div>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const API_HOST = 'sportapi7.p.rapidapi.com';

// Hierarchia lig: Ekstraklasa (ID 344), potem Top 5
const TOP_LEAGUES = [344, 17, 8, 23, 35, 4]; 

async function fetchData() {
    try {
        const res = await fetch(`https://${API_HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        processMatches(data.events);
    } catch (e) {
        document.getElementById('leagues-container').innerHTML = "Błąd API.";
    }
}

function processMatches(events) {
    if(!events || events.length === 0) return;

    // 1. Spotkanie Dnia (pierwsze z brzegu lub z top ligi)
    renderFeatured(events[0]);

    // 2. Grupowanie według lig
    const groups = events.reduce((acc, ev) => {
        const lName = ev.tournament.uniqueTournament.name || ev.tournament.name;
        const lId = ev.tournament.uniqueTournament.id;
        if (!acc[lName]) acc[lName] = { id: lId, matches: [] };
        acc[lName].matches.push(ev);
        return acc;
    }, {});

    // 3. Sortowanie grup (Ekstraklasa > Top 5 > Inne)
    const sortedLeagues = Object.keys(groups).sort((a, b) => {
        const idA = groups[a].id;
        const idB = groups[b].id;
        const posA = TOP_LEAGUES.indexOf(idA) === -1 ? 999 : TOP_LEAGUES.indexOf(idA);
        const posB = TOP_LEAGUES.indexOf(idB) === -1 ? 999 : TOP_LEAGUES.indexOf(idB);
        return posA - posB;
    });

    renderLeagues(groups, sortedLeagues);
}

function renderFeatured(ev) {
    const section = document.getElementById('featured-section');
    section.innerHTML = `
        <div class="featured-match">
            <div class="featured-title">Spotkanie dnia</div>
            <div class="featured-teams">
                <span>${ev.homeTeam.shortName}</span>
                <span style="color:var(--sofa-blue)">${ev.homeScore.current} : ${ev.awayScore.current}</span>
                <span>${ev.awayTeam.shortName}</span>
            </div>
            <div class="live-tag" style="margin-top:10px">${ev.status.description}</div>
        </div>
    `;
}

function renderLeagues(groups, sortedNames) {
    const container = document.getElementById('leagues-container');
    container.innerHTML = '';

    sortedNames.forEach(name => {
        const league = groups[name];
        const leagueDiv = document.createElement('div');
        leagueDiv.className = 'league-group';
        
        let matchesHtml = league.matches.map(m => `
            <div class="match-row">
                <div class="m-time">${m.status.type === 'inprogress' ? '<span class="live-tag">LIVE</span>' : '19:30'}</div>
                <div class="m-teams">
                    <div>${m.homeTeam.name}</div>
                    <div>${m.awayTeam.name}</div>
                </div>
                <div class="m-score">
                    <div>${m.homeScore.current}</div>
                    <div>${m.awayScore.current}</div>
                </div>
            </div>
        `).join('');

        leagueDiv.innerHTML = `
            <div class="league-header">${name}</div>
            ${matchesHtml}
        `;
        container.appendChild(leagueDiv);
    });
}

fetchData();
</script>
</body>
</html>
