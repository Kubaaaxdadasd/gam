<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect Live</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.95);
            --sofa-blue: #0047ff;
            --text-gray: #aaa;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
            --border: 1px solid rgba(255,255,255,0.1);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('boisko.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
        }

        /* LAYOUT */
        nav { background: var(--sofa-blue); padding: 0 20px; display: flex; height: 55px; align-items: center; gap: 30px; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; }

        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            max-width: 1500px;
            margin: 20px auto;
            padding: 0 15px;
            align-items: start;
        }

        /* PANELE BOCZNE - DŁUGIE */
        .sidebar-panel { 
            background: var(--card-bg); 
            border: var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            min-height: 85vh; 
        }
        .sidebar-panel h3 { font-size: 0.75rem; color: var(--sofa-blue); text-transform: uppercase; border-bottom: var(--border); padding-bottom: 10px; margin-top: 0; }

        /* LISTY BOCZNE */
        .side-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-rank { width: 20px; font-size: 0.7rem; color: var(--text-gray); }
        .side-info { flex: 1; margin-left: 10px; }
        .side-name { font-size: 0.8rem; font-weight: 600; display: block; }
        .side-sub { font-size: 0.65rem; color: var(--text-gray); }
        .side-val { font-size: 0.75rem; font-weight: 800; padding: 3px 6px; border-radius: 4px; }
        .val-rate { background: var(--rating-green); color: black; }
        .val-goal { background: #333; color: white; }

        /* KARTY MECZOWE */
        .league-card { background: var(--card-bg); border-radius: 12px; border: var(--border); margin-bottom: 15px; overflow: hidden; }
        .league-header { background: rgba(255,255,255,0.05); padding: 8px 15px; font-size: 0.7rem; font-weight: 800; color: var(--text-gray); }
        
        .match-row { display: flex; align-items: center; padding: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .m-time { width: 40px; color: var(--accent-red); font-size: 0.7rem; font-weight: 800; }
        .m-teams { flex: 1; font-size: 0.9rem; font-weight: 600; }
        .m-score { font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: 800; color: var(--sofa-blue); }

        /* MATCH CENTER (ROZWIJANE) */
        .match-details { display: none; background: #0a0a0a; border-top: 1px solid #222; padding: 15px; }
        .match-details.active { display: block; }
        
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tab { padding: 8px 0; font-size: 0.7rem; font-weight: 800; color: var(--text-gray); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--sofa-blue); border-bottom: 2px solid var(--sofa-blue); }

        .detail-content { font-size: 0.8rem; }
        .pitch-view { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; height: 180px; border-radius: 8px; 
            position: relative; margin: 10px 0; border: 1px solid #333;
        }

        /* RESPONSYWNOŚĆ */
        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
            .sidebar-panel { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="#">HOME</a>
    <a href="#" style="border-bottom: 2px solid white;">MECZE</a>
    <a href="#">WIADOMOŚCI</a>
</nav>

<div class="main-grid">
    <aside class="sidebar-panel">
        <h3>Top Oceny</h3>
        <select id="ratingSelect" style="width:100%; margin-bottom:15px;" onchange="renderLeftPanel()">
            <option value="cl">Champions League</option>
            <option value="pl">Premier League</option>
            <option value="ek">Ekstraklasa</option>
        </select>
        <div id="left-list"></div>
    </aside>

    <main>
        <div id="live-matches">Ładowanie wyników na żywo...</div>
    </main>

    <aside class="sidebar-panel">
        <h3>Top Strzelcy</h3>
        <div id="right-list"></div>
    </aside>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const API_HOST = 'sportapi7.p.rapidapi.com';

// FUNKCJA POBIERANIA MECZÓW LIVE
async function fetchLive() {
    try {
        const res = await fetch(`https://${API_HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        renderLiveContent(data.events || []);
    } catch (e) {
        document.getElementById('live-matches').innerHTML = "Błąd API. Sprawdź klucz lub limity.";
    }
}

function renderLiveContent(events) {
    const container = document.getElementById('live-matches');
    if(events.length === 0) {
        container.innerHTML = "<div class='league-card' style='padding:20px; text-align:center;'>Brak meczów na żywo.</div>";
        return;
    }

    const leagues = {};
    events.forEach(ev => {
        const lName = ev.tournament.name;
        if(!leagues[lName]) leagues[lName] = [];
        leagues[lName].push(ev);
    });

    container.innerHTML = Object.keys(leagues).map(lName => `
        <div class="league-card">
            <div class="league-header">${lName}</div>
            ${leagues[lName].map(m => `
                <div class="match-row" onclick="toggleMatch(${m.id})">
                    <div class="m-time">LIVE</div>
                    <div class="m-teams">
                        <div>${m.homeTeam.name}</div>
                        <div>${m.awayTeam.name}</div>
                    </div>
                    <div class="m-score">${m.homeScore.current} - ${m.awayScore.current}</div>
                </div>
                <div id="details-${m.id}" class="match-details">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab(event, ${m.id}, 'info')">Szczegóły</div>
                        <div class="tab" onclick="switchTab(event, ${m.id}, 'lineup')">Składy</div>
                        <div class="tab" onclick="switchTab(event, ${m.id}, 'stats')">Statystyki</div>
                    </div>
                    <div id="content-${m.id}" class="detail-content">
                        Pobieranie szczegółów...
                    </div>
                </div>
            `).join('')}
        </div>
    `).join('');
}

// MECHANIZM ROZWIJANIA I ZAKŁADEK
function toggleMatch(id) {
    const el = document.getElementById(`details-${id}`);
    const isActive = el.classList.contains('active');
    document.querySelectorAll('.match-details').forEach(d => d.classList.remove('active'));
    if(!isActive) {
        el.classList.add('active');
        loadTabContent(id, 'info');
    }
}

function loadTabContent(id, tab) {
    const content = document.getElementById(`content-${id}`);
    if(tab === 'info') {
        content.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <div>⚽ 22' Strzelec<br><span style="color:gray; font-size:0.6rem;">Asysta: Zawodnik</span></div>
                <div style="text-align:right;">🟨 40' Zawodnik</div>
            </div>`;
    } else if(tab === 'lineup') {
        content.innerHTML = `<div class="pitch-view"></div><center style="font-size:0.6rem;">Wybierz zawodnika, by zobaczyć statystyki</center>`;
    } else if(tab === 'stats') {
        content.innerHTML = `Posiadanie: 50% - 50%<br>Strzały: 4 - 2<br>Rzuty rożne: 1 - 5`;
    }
}

function switchTab(e, id, tab) {
    e.stopPropagation();
    const parent = e.target.parentElement;
    parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    loadTabContent(id, tab);
}

// PANELE BOCZNE - DANE
function renderLeftPanel() {
    const players = [
        {n: "Robert Lewandowski", c: "FC Barcelona", v: "8.2"},
        {n: "Lamine Yamal", c: "FC Barcelona", v: "7.9"},
        {n: "Raphinha", c: "FC Barcelona", v: "7.8"},
        {n: "Pedri", c: "FC Barcelona", v: "7.5"},
        {n: "Iñigo Martínez", c: "FC Barcelona", v: "7.4"}
    ];
    document.getElementById('left-list').innerHTML = players.map((p, i) => `
        <div class="side-item">
            <div class="side-rank">${i+1}</div>
            <div class="side-info"><span class="side-name">${p.n}</span><span class="side-sub">${p.c}</span></div>
            <div class="side-val val-rate">${p.v}</div>
        </div>
    `).join('');
}

function renderRightPanel() {
    const scorers = [
        {n: "Erling Haaland", c: "Man City", v: "18"},
        {n: "Harry Kane", c: "Bayern", v: "15"},
        {n: "M. Salah", c: "Liverpool", v: "14"},
        {n: "K. Mbappé", c: "Real Madrid", v: "12"}
    ];
    document.getElementById('right-list').innerHTML = scorers.map((p, i) => `
        <div class="side-item">
            <div class="side-rank">${i+1}</div>
            <div class="side-info"><span class="side-name">${p.n}</span><span class="side-sub">${p.c}</span></div>
            <div class="side-val val-goal">${p.v}</div>
        </div>
    `).join('');
}

// START
fetchLive();
renderLeftPanel();
renderRightPanel();
setInterval(fetchLive, 60000);
</script>
</body>
</html>
