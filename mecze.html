<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Football Dashboard - Test Mode</title>
    <style>
        :root { --blue: #0047ff; --dark: #0a0a0a; --card: #141414; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Tło boiska */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center;
               background-size: cover; z-index: -1; }

        .container { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; height: fit-content; }
        
        /* Styl listy meczów */
        .match-box { background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .match-header { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
        .match-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: var(--blue); font-weight: bold; font-size: 20px; }

        /* BOISKO - Naprawione pozycjonowanie */
        .details { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .details.active { display: block; }
        
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            aspect-ratio: 16/9; 
            border: 1px solid #444; 
            display: flex; 
        }
        .half { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; }
        .player { font-size: 12px; margin: 3px 0; display: flex; gap: 8px; }
        .num { color: var(--blue); font-weight: bold; width: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="panel"><h3>Top Oceny</h3><div id="ratings">Ładowanie...</div></div>
        
        <div id="matches-list">
            </div>

        <div class="panel"><h3>Top Strzelcy</h3><div id="scorers">
            <div class="player"><span class="num">1</span> Haaland (18)</div>
            <div class="player"><span class="num">2</span> Lewandowski (15)</div>
        </div></div>
    </div>

<script>
const KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

async function init() {
    await fetchMatches();
    fetchTopPlayers();
}

async function fetchMatches() {
    const col = document.getElementById('matches-col') || document.body;
    try {
        const res = await fetch(`https://${HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        let events = data.events || [];

        // TRYB TESTOWY: Jeśli API jest puste, dodajemy mecz do kliknięcia
        if (events.length === 0) {
            events = [{
                id: "test",
                tournament: { name: "PREMIER LEAGUE (TEST)" },
                homeTeam: { name: "Bournemouth" },
                awayTeam: { name: "Man Utd" },
                homeScore: { current: 0 }, awayScore: { current: 0 }
            }];
        }
        renderUI(events, col);
    } catch (e) { console.error("Błąd API"); }
}

function renderUI(events, col) {
    col.innerHTML = events.map(m => `
        <div style="background:#141414; border:1px solid #333; margin:10px auto; max-width:600px; border-radius:12px; overflow:hidden;">
            <div style="padding:15px; display:flex; justify-content:space-between; cursor:pointer;" onclick="showPitch('${m.id}')">
                <span>${m.homeTeam.name}</span>
                <span style="color:#0047ff; font-weight:bold;">${m.homeScore.current} - ${m.awayScore.current}</span>
                <span>${m.awayTeam.name}</span>
            </div>
            <div id="pitch-${m.id}" style="display:none; padding:10px; background:#000;">
                <div style="background:url('boisko.jpg') no-repeat center; background-size:cover; aspect-ratio:16/9; display:flex; border:1px solid #444;">
                    <div id="h-line-${m.id}" style="flex:1; padding:10px; background:rgba(0,0,0,0.5);"></div>
                    <div id="a-line-${m.id}" style="flex:1; padding:10px; background:rgba(0,0,0,0.5); text-align:right;"></div>
                </div>
            </div>
        </div>
    `).join('');
}

async function showPitch(id) {
    const el = document.getElementById(`pitch-${id}`);
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
    
    if (id === "test") {
        fillLineup(`h-line-${id}`, ["Neto", "Cook", "Solanke"]);
        fillLineup(`a-line-${id}`, ["Onana", "Mainoo", "Hojlund"], true);
    } else {
        try {
            const res = await fetch(`https://${HOST}/api/v1/event/${id}/lineups`, {
                headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
            });
            const d = await res.json();
            fillLineup(`h-line-${id}`, d.home.players.map(p => p.player.name).slice(0,11));
            fillLineup(`a-line-${id}`, d.away.players.map(p => p.player.name).slice(0,11), true);
        } catch(e) { console.log("Brak składów w API"); }
    }
}

function fillLineup(divId, names, rev = false) {
    document.getElementById(divId).innerHTML = names.map((n, i) => `
        <div style="font-size:11px; margin:3px; display:flex; ${rev ? 'flex-direction:row-reverse' : ''}">
            <b style="color:#0047ff; width:20px;">${i+1}</b> ${n}
        </div>
    `).join('');
}

async function fetchTopPlayers() {
    const r = document.getElementById('ratings-list');
    if (!r) return;
    try {
        const res = await fetch(`https://${HOST}/api/v1/unique-tournament/17/season/61627/statistics?type=rating&count=5`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const d = await res.json();
        r.innerHTML = d.statistics.map(s => `<div style="font-size:12px; margin-bottom:5px;">${s.player.name} (${s.rating.toFixed(2)})</div>`).join('');
    } catch(e) { r.innerHTML = "Limit API"; }
}

init();
</script>
</body>
</html>
