<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Football Dashboard - Test Mode</title>
    <style>
        :root { --blue: #0047ff; --dark: #0a0a0a; --card: #141414; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        
        /* Tło boiska */
        .bg { position: fixed; top:0; left:0; width:100%; height:100%; 
               background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center;
               background-size: cover; z-index: -1; }

        .container { display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        .panel { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; height: fit-content; }
        
        /* Styl listy meczów */
        .match-box { background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #333; }
        .match-header { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
        .match-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .score { color: var(--blue); font-weight: bold; font-size: 20px; }

        /* BOISKO - Naprawione pozycjonowanie */
        .details { display: none; padding: 15px; background: #000; border-top: 1px solid #333; }
        .details.active { display: block; }
        
        .pitch { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            aspect-ratio: 16/9; 
            border: 1px solid #444; 
            display: flex; 
        }
        .half { flex: 1; padding: 10px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; justify-content: center; }
        .player { font-size: 12px; margin: 3px 0; display: flex; gap: 8px; }
        .num { color: var(--blue); font-weight: bold; width: 20px; }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="panel"><h3>Top Oceny</h3><div id="ratings">Ładowanie...</div></div>
        
        <div id="matches-list">
            </div>

        <div class="panel"><h3>Top Strzelcy</h3><div id="scorers">
            <div class="player"><span class="num">1</span> Haaland (18)</div>
            <div class="player"><span class="num">2</span> Lewandowski (15)</div>
        </div></div>
    </div>

<script>
const KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

function injectStyles() {
    const style = document.createElement('style');
    style.innerHTML = `
        .match-card { background: #111; border: 1px solid #333; border-radius: 12px; margin: 20px auto; max-width: 950px; color: white; font-family: sans-serif; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .match-info { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: #1a1a1a; transition: 0.3s; }
        .match-info:hover { background: #222; }
        .pitch-container { 
            position: relative;
            background: url('boisko.jpg') no-repeat center; 
            background-size: 100% 100%; 
            aspect-ratio: 16/9; 
            border-top: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%; /* Osuwa składy od bramek do środka */
        }
        .team-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 200px;
            z-index: 2;
        }
        .player-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 14px; 
            font-weight: 500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .p-number { 
            color: #0047ff; 
            background: rgba(0, 71, 255, 0.1); 
            border: 1px solid #0047ff;
            border-radius: 4px;
            width: 24px; 
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
        }
    `;
    document.head.appendChild(style);
}

async function init() {
    injectStyles();
    const container = document.getElementById('matches-col') || document.body;
    
    try {
        const res = await fetch(`https://${HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        let matches = data.events || [];

        if (matches.length === 0) {
            matches = [{
                id: "demo_id",
                tournament: { name: "PREMIER LEAGUE (MECZ TESTOWY)" },
                homeTeam: { name: "Bournemouth" },
                awayTeam: { name: "Man Utd" },
                homeScore: { current: 1 },
                awayScore: { current: 2 }
            }];
        }
        
        container.innerHTML = matches.map(m => `
            <div class="match-card">
                <div style="padding: 10px; font-size: 11px; color: #666; text-align: center; text-transform: uppercase; letter-spacing: 1px;">${m.tournament.name}</div>
                <div class="match-info" onclick="document.getElementById('p-${m.id}').style.display = (document.getElementById('p-${m.id}').style.display === 'none' ? 'flex' : 'none')">
                    <span style="flex:1; font-size: 18px;">${m.homeTeam.name}</span>
                    <span style="color:#0047ff; font-weight:900; font-size:28px; margin: 0 20px;">${m.homeScore.current} - ${m.awayScore.current}</span>
                    <span style="flex:1; text-align:right; font-size: 18px;">${m.awayTeam.name}</span>
                </div>
                <div id="p-${m.id}" class="pitch-container" style="display:none;">
                    <div id="home-players-${m.id}" class="team-list"></div>
                    <div id="away-players-${m.id}" class="team-list" style="text-align:right;"></div>
                </div>
            </div>
        `).join('');
    } catch (e) { container.innerHTML = "<div style='color:white;text-align:center;'>Błąd API</div>"; }
}

function renderLineup(containerId, players, isAway = false) {
    const box = document.getElementById(containerId);
    box.innerHTML = players.map((p, i) => `
        <div class="player-row" style="${isAway ? 'flex-direction: row-reverse' : ''}">
            <div class="p-number">${i+1}</div>
            <span>${p}</span>
        </div>
    `).join('');
}

// Funkcja wywoływana przy kliknięciu (w demo używa statycznych danych)
window.togglePitch = (id) => {
    if (id === "demo_id") {
        renderLineup(`home-players-${id}`, ["Neto", "Zabarnyi", "Cook", "Solanke", "Kluivert"]);
        renderLineup(`away-players-${id}`, ["Onana", "Maguire", "Mainoo", "Fernandes", "Hojlund"], true);
    }
};

// Dodajemy obsługę kliknięcia dla demo
document.addEventListener('click', (e) => {
    if(e.target.closest('.match-info')) {
        window.togglePitch("demo_id");
    }
});

init();
</script>
</body>
</html>
