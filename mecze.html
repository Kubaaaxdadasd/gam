<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect PRO</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.9);
            --sofa-blue: #0047ff;
            --text-gray: #aaa;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
            --border: 1px solid rgba(255,255,255,0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('boisko.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        /* MENU */
        nav { 
            background: var(--sofa-blue); 
            padding: 0 30px; 
            display: flex; 
            height: 60px; 
            align-items: center; 
            gap: 40px;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        nav a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        nav a.active { border-bottom: 3px solid white; height: 100%; display: flex; align-items: center; }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 320px;
            gap: 20px;
            max-width: 1600px;
            margin: 25px auto;
            padding: 0 20px;
            align-items: start;
        }

        /* PANELE BOCZNE */
        .sidebar-panel { 
            background: var(--card-bg); 
            border: var(--border); 
            border-radius: 15px; 
            padding: 20px; 
            min-height: 80vh; /* Długa lista na całą stronę */
        }

        .panel-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            border-bottom: var(--border);
            padding-bottom: 15px;
        }
        .panel-header h3 { font-size: 0.8rem; color: var(--sofa-blue); text-transform: uppercase; margin: 0; letter-spacing: 1px; }

        select { 
            background: #222; color: white; border: var(--border); 
            font-size: 0.75rem; padding: 5px; border-radius: 6px; outline: none;
        }

        /* LISTY ZAWODNIKÓW / STRZELCÓW */
        .player-row { 
            display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .p-rank { width: 25px; font-size: 0.75rem; color: var(--text-gray); font-weight: bold; }
        .p-info { flex: 1; margin-left: 10px; }
        .p-name { font-size: 0.85rem; font-weight: 600; display: block; }
        .p-club { font-size: 0.7rem; color: var(--text-gray); }
        .p-stat { font-weight: 800; font-size: 0.8rem; padding: 4px 8px; border-radius: 5px; min-width: 35px; text-align: center; }
        
        .rate-box { background: var(--rating-green); color: black; }
        .goals-box { background: rgba(255,255,255,0.1); color: white; border: var(--border); }

        /* ŚRODEK */
        .match-card { background: var(--card-bg); border-radius: 15px; border: var(--border); margin-bottom: 20px; overflow: hidden; }
        .featured { padding: 30px; text-align: center; background: linear-gradient(180deg, rgba(0,71,255,0.1) 0%, rgba(0,0,0,0) 100%); }
        .f-score { font-size: 3rem; font-weight: 900; color: var(--sofa-blue); margin: 15px 0; letter-spacing: 5px; }

        .league-title { background: rgba(255,255,255,0.05); padding: 12px 20px; font-size: 0.8rem; font-weight: 800; color: var(--text-gray); text-transform: uppercase; }
        .live-row { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .live-row:last-child { border: none; }
        .l-time { width: 50px; color: var(--accent-red); font-weight: 800; font-size: 0.75rem; }
        .l-teams { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .l-score { font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; font-weight: 800; color: var(--sofa-blue); }

        @media (max-width: 1100px) {
            .main-grid { grid-template-columns: 1fr; }
            .sidebar-panel { min-height: auto; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="mecze.html" class="active">Mecze</a>
    <a href="wiadomosci.html">Wiadomości</a>
</nav>

<div class="main-grid">
    <aside class="sidebar-panel">
        <div class="panel-header">
            <h3>Średnie Oceny</h3>
            <select id="ratingLeague" onchange="renderRatings()">
                <option value="cl">Champions League</option>
                <option value="pl">Premier League</option>
                <option value="ll">La Liga</option>
                <option value="ek">Ekstraklasa</option>
            </select>
        </div>
        <div id="ratings-list"></div>
    </aside>

    <main>
        <div class="match-card featured" id="featured-match">
            <span style="font-size:0.7rem; font-weight:800; color:var(--sofa-blue); letter-spacing:2px;">SPOTKANIE DNIA</span>
            <div class="f-score">0 : 0</div>
            <div style="font-size:1.1rem; font-weight:700;">Ładowanie hitu...</div>
        </div>

        <div id="live-container">
            </div>
    </main>

    <aside class="sidebar-panel">
        <div class="panel-header">
            <h3>Top Strzelcy</h3>
            <select id="scorerLeague" onchange="renderScorers()">
                <option value="top5">Top 5 Lig</option>
                <option value="ek">Ekstraklasa</option>
            </select>
        </div>
        <div id="scorers-list"></div>
    </aside>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const API_HOST = 'sportapi7.p.rapidapi.com';

// DANE DO RANKINGÓW (Symulacja długich list)
const ratingsData = {
    cl: [
        {n: "Kylian Mbappé", c: "Real Madrid", s: "8.12"}, {n: "Erling Haaland", c: "Man City", s: "8.05"},
        {n: "Vini Jr.", c: "Real Madrid", s: "7.98"}, {n: "Jude Bellingham", c: "Real Madrid", s: "7.90"},
        {n: "Kevin De Bruyne", c: "Man City", s: "7.85"}, {n: "Harry Kane", c: "Bayern", s: "7.82"},
        {n: "Lamine Yamal", c: "Barcelona", s: "7.79"}, {n: "Mohamed Salah", c: "Liverpool", s: "7.75"},
        {n: "Bukayo Saka", c: "Arsenal", s: "7.72"}, {n: "Florian Wirtz", c: "Leverkusen", s: "7.70"}
    ],
    ll: [
        {n: "Robert Lewandowski", c: "Barcelona", s: "7.95"}, {n: "Federico Valverde", c: "Real Madrid", s: "7.88"},
        {n: "Antoine Griezmann", c: "Atlético", s: "7.82"}, {n: "Pedri", c: "Barcelona", s: "7.75"}
    ],
    ek: [
        {n: "Mikael Ishak", c: "Lech Poznań", s: "7.65"}, {n: "Marc Gual", c: "Legia Warszawa", s: "7.42"},
        {n: "Ivi López", c: "Raków", s: "7.38"}, {n: "Benjamin Källman", c: "Cracovia", s: "7.30"}
    ]
};

const scorersData = {
    top5: [
        {n: "Erling Haaland", c: "Man City", g: "18"}, {n: "Robert Lewandowski", c: "Barcelona", g: "15"},
        {n: "Harry Kane", c: "Bayern", g: "14"}, {n: "Mohamed Salah", c: "Liverpool", g: "12"},
        {n: "Kylian Mbappé", c: "Real Madrid", g: "10"}
    ],
    ek: [
        {n: "Leonardo Rocha", c: "Radomiak", g: "10"}, {n: "Mikael Ishak", c: "Lech Poznań", g: "9"},
        {n: "Efthymios Koulouris", c: "Pogoń", g: "8"}
    ]
};

function renderRatings() {
    const val = document.getElementById('ratingLeague').value;
    const data = ratingsData[val] || ratingsData['cl'];
    document.getElementById('ratings-list').innerHTML = data.map((p, i) => `
        <div class="player-row">
            <div class="p-rank">${i+1}</div>
            <div class="p-info"><span class="p-name">${p.n}</span><span class="p-club">${p.c}</span></div>
            <div class="p-stat rate-box">${p.s}</div>
        </div>
    `).join('');
}

function renderScorers() {
    const val = document.getElementById('scorerLeague').value;
    const data = scorersData[val] || scorersData['top5'];
    document.getElementById('scorers-list').innerHTML = data.map((p, i) => `
        <div class="player-row">
            <div class="p-rank">${i+1}</div>
            <div class="p-info"><span class="p-name">${p.n}</span><span class="p-club">${p.c}</span></div>
            <div class="p-stat goals-box">${p.g}</div>
        </div>
    `).join('');
}

async function fetchLive() {
    try {
        const res = await fetch(`https://${API_HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await res.json();
        const events = data.events || [];
        
        if(events.length > 0) {
            const top = events[0];
            document.getElementById('featured-match').innerHTML = `
                <span style="font-size:0.7rem; font-weight:800; color:var(--sofa-blue); letter-spacing:2px;">SPOTKANIE DNIA</span>
                <div class="f-score">${top.homeScore.current} : ${top.awayScore.current}</div>
                <div style="font-size:1.1rem; font-weight:700;">${top.homeTeam.name} vs ${top.awayTeam.name}</div>
            `;
        }

        // Grupowanie lig
        const leagues = {};
        events.forEach(ev => {
            const n = ev.tournament.name;
            if(!leagues[n]) leagues[n] = [];
            leagues[n].push(ev);
        });

        document.getElementById('live-container').innerHTML = Object.keys(leagues).map(lName => `
            <div class="match-card">
                <div class="league-title">${lName}</div>
                ${leagues[lName].map(m => `
                    <div class="live-row">
                        <div class="l-time">LIVE</div>
                        <div class="l-teams">${m.homeTeam.shortName} - ${m.awayTeam.shortName}</div>
                        <div class="l-score">${m.homeScore.current}:${m.awayScore.current}</div>
                    </div>
                `).join('')}
            </div>
        `).join('');

    } catch(e) { console.error(e); }
}

// Start
renderRatings();
renderScorers();
fetchLive();
setInterval(fetchLive, 60000);
</script>

</body>
</html>
