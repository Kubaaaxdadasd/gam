<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect - Na Żywo</title>
    <style>
        :root {
            --bg-dark: #050505;
            --card-bg: rgba(17, 17, 17, 0.95);
            --sofa-blue: #0047ff;
            --text-gray: #888;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('boisko.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        nav { background: var(--sofa-blue); padding: 0 20px; display: flex; height: 55px; align-items: center; gap: 30px; position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.9rem; opacity: 0.8; }
        nav a.active { opacity: 1; border-bottom: 3px solid white; height: 100%; display: flex; align-items: center; }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 15px;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Rankingi */
        .sidebar-panel { background: var(--card-bg); border: 1px solid #222; border-radius: 12px; padding: 15px; height: fit-content; }
        .panel-title { font-size: 0.75rem; color: var(--text-gray); text-transform: uppercase; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .player-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a1a; }
        .p-name { font-size: 0.85rem; font-weight: 600; flex: 1; }
        .p-rate { background: var(--rating-green); color: black; font-weight: 800; padding: 3px 6px; border-radius: 4px; font-size: 0.75rem; }

        /* Tabela meczów */
        .league-group { background: var(--card-bg); border-radius: 10px; border: 1px solid #222; overflow: hidden; margin-bottom: 15px; }
        .league-header { background: #1a1a1a; padding: 10px 15px; font-size: 0.75rem; font-weight: 700; color: var(--text-gray); display: flex; justify-content: space-between; }
        
        .match-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #1a1a1a; transition: 0.2s; }
        .match-row:hover { background: #161616; }
        .m-status { width: 45px; font-size: 0.7rem; color: var(--accent-red); font-weight: 800; }
        .m-teams { flex: 1; font-size: 0.85rem; }
        .m-score { width: 40px; text-align: right; color: var(--sofa-blue); font-weight: 800; font-family: 'Courier New', monospace; font-size: 1.1rem; }

        .featured-match { background: var(--card-bg); border-radius: 12px; padding: 25px; text-align: center; border: 1px solid #222; margin-bottom: 15px; }
        .f-score { font-size: 2.5rem; font-weight: 800; color: var(--sofa-blue); margin: 5px 0; }

        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .sidebar-panel { display: none; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="mecze.html" class="active">Mecze</a>
    <a href="wiadomosci.html">Wiadomości</a>
</nav>

<div class="main-grid">
    <aside class="sidebar-panel">
        <div class="panel-title">
            <span>Top Zawodnicy</span>
            <select id="lPicker" style="background:#222; color:white; border:none; font-size:0.7rem;" onchange="updateRanking()">
                <option value="pl">Premier League</option>
                <option value="cl">Champions League</option>
            </select>
        </div>
        <div id="player-list"></div>
    </aside>

    <main>
        <div id="featured-box"></div>
        <div id="live-table">Ładowanie meczów na żywo...</div>
    </main>

    <aside class="sidebar-panel">
        <div class="panel-title">Miejsce na statystyki</div>
    </aside>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const API_HOST = 'sportapi7.p.rapidapi.com';

// ID lig, które chcemy widzieć na samym początku
const PRIORITY_LEAGUES = [344, 17, 8, 23, 35, 4]; // Ekstraklasa jest pierwsza (344)

async function getLiveUpdates() {
    try {
        const response = await fetch(`https://${API_HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': API_HOST }
        });
        const data = await response.json();
        renderMatches(data.events);
    } catch (error) {
        document.getElementById('live-table').innerHTML = "Błąd podczas pobierania aktualnych wyników.";
    }
}

function renderMatches(events) {
    if (!events || events.length === 0) {
        document.getElementById('live-table').innerHTML = "Obecnie nie trwają żadne mecze.";
        return;
    }

    // Grupowanie meczów według lig
    const groups = {};
    events.forEach(event => {
        const leagueName = event.tournament.name;
        if (!groups[leagueName]) {
            groups[leagueName] = {
                id: event.tournament.uniqueTournament?.id,
                matches: []
            };
        }
        groups[leagueName].matches.push(event);
    });

    // Sortowanie lig (Priorytety na górę)
    const sortedLeagues = Object.keys(groups).sort((a, b) => {
        const scoreA = PRIORITY_LEAGUES.indexOf(groups[a].id) === -1 ? 999 : PRIORITY_LEAGUES.indexOf(groups[a].id);
        const scoreB = PRIORITY_LEAGUES.indexOf(groups[b].id) === -1 ? 999 : PRIORITY_LEAGUES.indexOf(groups[b].id);
        return scoreA - scoreB;
    });

    // Budowanie HTML
    let html = '';
    sortedLeagues.forEach(name => {
        html += `
            <div class="league-group">
                <div class="league-header">
                    <span>${name}</span>
                    <span style="font-size:0.6rem; opacity:0.5;">LIVE</span>
                </div>
                ${groups[name].matches.map(m => `
                    <div class="match-row">
                        <div class="m-status">${m.status.description === '1st half' ? '1H' : (m.status.description === '2nd half' ? '2H' : 'LIVE')}</div>
                        <div class="m-teams">
                            <div>${m.homeTeam.shortName}</div>
                            <div>${m.awayTeam.shortName}</div>
                        </div>
                        <div class="m-score">
                            <div>${m.homeScore.current}</div>
                            <div>${m.awayScore.current}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    });

    document.getElementById('live-table').innerHTML = html;

    // Aktualizacja "Spotkania Dnia" pierwszym meczem z listy
    const topMatch = events[0];
    document.getElementById('featured-box').innerHTML = `
        <div class="featured-match">
            <div style="font-size: 0.65rem; color: var(--sofa-blue); font-weight: 800; letter-spacing: 1px;">SPOTKANIE DNIA</div>
            <div class="f-score">${topMatch.homeScore.current} : ${topMatch.awayScore.current}</div>
            <div style="font-size: 0.9rem; font-weight: 700;">${topMatch.homeTeam.name} vs ${topMatch.awayTeam.name}</div>
        </div>
    `;
}

// Inicjalizacja i odświeżanie co 60 sekund
getLiveUpdates();
setInterval(getLiveUpdates, 60000);

// Statyczne dane do rankingu (żeby nie marnować limitów API na każdym odświeżeniu)
function updateRanking() {
    const players = [
        { n: "Mohamed Salah", c: "Liverpool", r: "8.05" },
        { n: "Bukayo Saka", c: "Arsenal", r: "7.92" },
        { n: "Cole Palmer", c: "Chelsea", r: "7.84" }
    ];
    document.getElementById('player-list').innerHTML = players.map(p => `
        <div class="player-item">
            <div class="p-name">${p.n}</div>
            <div class="p-rate">${p.r}</div>
        </div>
    `).join('');
}
updateRanking();
</script>
</body>
</html>
