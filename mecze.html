<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect Live</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --sofa-blue: #0047ff;
            --text-gray: #aaa;
            --accent-red: #ff2d55;
            --rating-green: #00d24d;
            --border: 1px solid rgba(255,255,255,0.05);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg-dark);
            color: white;
            min-height: 100vh;
        }

        /* Tło boiska w tle strony - tak jak na Twoich screenach */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('boisko.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        nav { background: var(--sofa-blue); padding: 0 20px; display: flex; height: 50px; align-items: center; gap: 30px; }
        nav a { color: white; text-decoration: none; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }

        .main-grid {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .sidebar-panel { background: var(--card-bg); border-radius: 12px; padding: 15px; border: var(--border); height: fit-content; }
        .sidebar-panel h3 { font-size: 0.7rem; color: var(--sofa-blue); text-transform: uppercase; margin-bottom: 15px; border-bottom: var(--border); padding-bottom: 8px; }

        /* Styl dla Top Oceny / Top Strzelcy */
        .side-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .side-rank { width: 25px; color: var(--text-gray); font-size: 0.75rem; }
        .side-info { flex: 1; }
        .side-name { display: block; font-size: 0.85rem; font-weight: 600; }
        .side-sub { font-size: 0.7rem; color: var(--text-gray); }
        .side-val { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 0.75rem; min-width: 35px; text-align: center; }
        .val-rate { background: var(--rating-green); color: black; }
        .val-goal { background: #333; color: white; }

        /* Karty meczów */
        .league-card { margin-bottom: 20px; }
        .league-header { font-size: 0.75rem; color: var(--text-gray); margin-bottom: 10px; font-weight: bold; }
        .match-row { 
            background: var(--card-bg); 
            border: var(--border); 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .match-row:hover { background: #1a1a1a; }
        .m-live { color: var(--accent-red); font-weight: 800; font-size: 0.65rem; width: 40px; }
        .m-teams { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .m-score { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: 800; color: var(--sofa-blue); }

        /* Szczegóły meczu i boisko */
        .match-details { display: none; background: #0f0f0f; border: var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 15px; margin-top: -5px; }
        .match-details.active { display: block; }
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .tab { padding: 8px 0; font-size: 0.7rem; font-weight: 800; color: var(--text-gray); cursor: pointer; text-transform: uppercase; }
        .tab.active { color: var(--sofa-blue); border-bottom: 2px solid var(--sofa-blue); }

        .pitch-view { 
            background: url('boisko.jpg') no-repeat center; 
            background-size: cover; 
            height: 220px; 
            border-radius: 8px; 
            display: flex; 
            border: 1px solid #333;
            overflow: hidden;
        }
        .pitch-side { flex: 1; padding: 10px; background: rgba(0,0,0,0.5); }
        .player-line { font-size: 0.7rem; margin: 3px 0; display: flex; gap: 8px; }
        .p-num { color: var(--text-gray); width: 15px; }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<nav>
    <a href="#">Home</a>
    <a href="#" style="border-bottom: 2px solid white;">Mecze</a>
    <a href="#">Wiadomości</a>
</nav>

<div class="main-grid">
    <aside class="sidebar-panel">
        <h3>Top Oceny</h3>
        <select id="ratingSelect" onchange="renderLeftPanel()" style="width:100%; background:#1a1a1a; color:white; border:1px solid #333; padding:5px; margin-bottom:15px; border-radius:4px; font-size:0.75rem;">
            <option value="pl">Premier League</option>
            <option value="cl">Champions League</option>
            <option value="ek">Ekstraklasa</option>
        </select>
        <div id="left-list"></div>
    </aside>

    <main id="live-matches">
        <div style="text-align:center; padding:50px; color:gray;">Pobieranie aktualnych wyników...</div>
    </main>

    <aside class="sidebar-panel">
        <h3>Top Strzelcy</h3>
        <div id="right-list"></div>
    </aside>
</div>

<script>
const API_KEY = '79fd2ae63bmsh4451c802cff7e6dp1e173fjsnaf461877a16f';
const HOST = 'sportapi7.p.rapidapi.com';

const LEAGUES = {
    pl: { tid: 17, sid: 61627 },
    cl: { tid: 7, sid: 63842 },
    ek: { tid: 106, sid: 61971 }
};

// 1. MECZE LIVE
async function fetchLive() {
    try {
        const res = await fetch(`https://${HOST}/api/v1/sport/football/events/live`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        renderMatches(data.events || []);
    } catch (e) {
        document.getElementById('live-matches').innerHTML = "Błąd API. Sprawdź limity RapidAPI.";
    }
}

function renderMatches(events) {
    const container = document.getElementById('live-matches');
    if (events.length === 0) {
        container.innerHTML = "<div class='match-row' style='justify-content:center;'>Obecnie brak meczów na żywo.</div>";
        return;
    }

    const grouped = {};
    events.forEach(e => {
        const lName = e.tournament.name;
        if (!grouped[lName]) grouped[lName] = [];
        grouped[lName].push(e);
    });

    container.innerHTML = Object.keys(grouped).map(league => `
        <div class="league-card">
            <div class="league-header">${league}</div>
            ${grouped[league].map(m => `
                <div class="match-row" onclick="toggleDetails(${m.id})">
                    <div class="m-live">LIVE</div>
                    <div class="m-teams">
                        <div>${m.homeTeam.name}</div>
                        <div>${m.awayTeam.name}</div>
                    </div>
                    <div class="m-score">${m.homeScore.current} - ${m.awayScore.current}</div>
                </div>
                <div id="det-${m.id}" class="match-details">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab(event, ${m.id}, 'lineup')">Składy</div>
                        <div class="tab" onclick="switchTab(event, ${m.id}, 'info')">Zdarzenia</div>
                    </div>
                    <div id="cnt-${m.id}">Kliknij "Składy", aby załadować...</div>
                </div>
            `).join('')}
        </div>
    `).join('');
}

// 2. SKŁADY (LINEUPS) - TO BYŁO ZEPSUTE
async function loadLineup(matchId) {
    const cnt = document.getElementById(`cnt-${matchId}`);
    cnt.innerHTML = "Ładowanie składów...";
    
    try {
        const res = await fetch(`https://${HOST}/api/v1/event/${matchId}/lineups`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        
        if (!data.home || !data.away) {
            cnt.innerHTML = "<div style='padding:20px; text-align:center; color:gray;'>Składy nie są jeszcze potwierdzone.</div>";
            return;
        }

        cnt.innerHTML = `
            <div class="pitch-view">
                <div class="pitch-side">
                    <div style="color:var(--sofa-blue); font-weight:bold; margin-bottom:10px; font-size:0.75rem;">${data.home.players[0].team.shortName}</div>
                    ${data.home.players.slice(0,11).map(p => `
                        <div class="player-line"><span class="p-num">${p.shirtNumber}</span> ${p.player.name}</div>
                    `).join('')}
                </div>
                <div class="pitch-side" style="text-align:right;">
                    <div style="color:var(--accent-red); font-weight:bold; margin-bottom:10px; font-size:0.75rem;">${data.away.players[0].team.shortName}</div>
                    ${data.away.players.slice(0,11).map(p => `
                        <div class="player-line" style="justify-content: flex-end;">${p.player.name} <span class="p-num">${p.shirtNumber}</span></div>
                    `).join('')}
                </div>
            </div>
        `;
    } catch (e) {
        cnt.innerHTML = "Błąd pobierania składów.";
    }
}

// 3. PANELE BOCZNE (DYNAMICZNE)
async function renderLeftPanel() {
    const val = document.getElementById('ratingSelect').value;
    const conf = LEAGUES[val];
    const list = document.getElementById('left-list');
    list.innerHTML = "Ładowanie...";

    try {
        const res = await fetch(`https://${HOST}/api/v1/unique-tournament/${conf.tid}/season/${conf.sid}/statistics?type=rating&count=5`, {
            headers: { 'x-rapidapi-key': API_KEY, 'x-rapidapi-host': HOST }
        });
        const data = await res.json();
        list.innerHTML = (data.statistics || []).map((p, i) => `
            <div class="side-item">
                <div class="side-rank">${i+1}</div>
                <div class="side-info">
                    <span class="side-name">${p.player.name}</span>
                    <span class="side-sub">${p.team.shortName}</span>
                </div>
                <div class="side-val val-rate">${p.rating.toFixed(2)}</div>
            </div>
        `).join('');
    } catch (e) { list.innerHTML = "Brak danych ocen."; }
}

function renderRightPanel() {
    // Statyczna lista dla przykładu, można zmienić na fetch analogicznie do ocen
    const top = [
        {name: "Erling Haaland", team: "Man City", goals: 18},
        {name: "Robert Lewandowski", team: "Barcelona", goals: 15},
        {name: "Harry Kane", team: "Bayern", goals: 14},
        {name: "Mo Salah", team: "Liverpool", goals: 14}
    ];
    document.getElementById('right-list').innerHTML = top.map((p, i) => `
        <div class="side-item">
            <div class="side-rank">${i+1}</div>
            <div class="side-info">
                <span class="side-name">${p.name}</span>
                <span class="side-sub">${p.team}</span>
            </div>
            <div class="side-val val-goal">${p.goals}</div>
        </div>
    `).join('');
}

// POMOCNICZE
function toggleDetails(id) {
    const el = document.getElementById(`det-${id}`);
    const isOpen = el.classList.contains('active');
    document.querySelectorAll('.match-details').forEach(d => d.classList.remove('active'));
    if (!isOpen) {
        el.classList.add('active');
        loadLineup(id);
    }
}

function switchTab(e, id, type) {
    e.stopPropagation();
    const parent = e.target.parentElement;
    parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    if (type === 'lineup') loadLineup(id);
}

// START
fetchLive();
renderLeftPanel();
renderRightPanel();
setInterval(fetchLive, 60000); // Odświeżaj co minutę
</script>
</body>
</html>
