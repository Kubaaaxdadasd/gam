<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect - Mecze na Żywo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; }
        nav { background: #1e293b; padding: 1rem; color: white; display: flex; gap: 15px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 0.9rem; }
        .news-container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; }
        .mecz-card { transition: transform 0.2s; }
        .mecz-card:hover { transform: scale(1.01); }
    </style>
</head>
<body>

<nav>
    <strong>⚽ Football Portal</strong>
    <a href="index.html">Home</a>
    <a href="projekt.html">Top 5 lig</a>
    <a href="news.html">Wiadomości</a>
    <a href="opinie.html">Mecze</a>
</nav>

<div class="news-container">
    <h2>Dzisiejsze Mecze</h2>
    <div id="football-news">
        <p style="text-align: center;">Ładowanie aktualnych meczów...</p>
    </div>
</div>

<script>
async function zaladujMecze() {
    const MY_TOKEN = 'f74f5a062c754c81866359ee05090ff3'; // Twój klucz
    const mainContainer = document.getElementById('football-news');
    const url = 'https://cors-anywhere.herokuapp.com/https://api.football-data.org/v4/matches';

    // Kody lig TOP 5 dostępne w Twoim planie
    const topLeagues = ['PL', 'PD', 'BL1', 'SA', 'FL1'];

    try {
        const response = await fetch(url, { headers: { 'X-Auth-Token': MY_TOKEN } });
        const data = await response.json();

        if (!data.matches || data.matches.length === 0) {
            mainContainer.innerHTML = '<p>Brak meczów na dzisiaj.</p>';
            return;
        }

        mainContainer.innerHTML = '<h3>Najważniejsze dzisiaj</h3><div id="top-matches"></div>';
        mainContainer.innerHTML += `
            <details style="margin-top: 20px;">
                <summary style="cursor: pointer; color: #2563eb; font-weight: bold;">Pokaż pozostałe mecze (${data.matches.length})</summary>
                <div id="other-matches" style="margin-top: 10px;"></div>
            </details>
        `;

        const topDiv = document.getElementById('top-matches');
        const otherDiv = document.getElementById('other-matches');

        data.matches.forEach(mecz => {
            const html = `
                <div style="border: 1px solid #eee; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; background: #fff;">
                    <div style="flex: 1; text-align: right;">
                        <img src="${mecz.homeTeam.crest}" width="20" style="vertical-align: middle; margin-right: 5px;">
                        ${mecz.homeTeam.shortName}
                    </div>
                    <div style="padding: 0 15px; font-weight: bold;">
                        ${mecz.score.fullTime.home ?? 0} : ${mecz.score.fullTime.away ?? 0}
                    </div>
                    <div style="flex: 1; text-align: left;">
                        ${mecz.awayTeam.shortName}
                        <img src="${mecz.awayTeam.crest}" width="20" style="vertical-align: middle; margin-left: 5px;">
                    </div>
                </div>
            `;

            // Sprawdzamy czy mecz należy do TOP 5
            if (topLeagues.includes(mecz.competition.code)) {
                topDiv.innerHTML += html;
            } else {
                otherDiv.innerHTML += html;
            }
        });

        // Jeśli nie ma meczów TOP 5, dajemy info
        if (topDiv.innerHTML === "") {
            topDiv.innerHTML = "<p style='color: gray;'>Brak dzisiejszych spotkań w Top 5 lig.</p>";
        }

    } catch (error) {
        mainContainer.innerHTML = '<p>Błąd. Upewnij się, że proxy jest aktywne.</p>';
    }
}
zaladujMecze();
</script>
</body>
</html>
