<div class="news-container" id="football-news">
    <p>Ładowanie dzisiejszych meczów...</p>
</div>

<script>
    async function zaladujMecze() {
        // TWÓJ KLUCZ Z OSTATNIEGO SCREENA:
        const MY_TOKEN = 'f74f5a062c754c81866359ee05090ff3'; 
        const container = document.getElementById('football-news');

        try {
            // Pobieramy mecze z najważniejszych lig (PL, PD, BL, SA, FL1)
            const response = await fetch('https://api.football-data.org/v4/matches', {
                headers: { 'X-Auth-Token': MY_TOKEN }
            });
            const data = await response.json();

            if (!data.matches || data.matches.length === 0) {
                container.innerHTML = '<p>Brak ciekawych meczów na dzisiaj.</p>';
                return;
            }

            container.innerHTML = ''; // Czyścimy loader

            data.matches.forEach(mecz => {
                const meczElement = document.createElement('div');
                meczElement.className = 'mecz-card';
                
                // Tworzymy wygląd pojedynczego meczu
                meczElement.innerHTML = `
                    <div style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 10px; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center;">
                        <div style="flex: 1; text-align: right;">
                            <img src="${mecz.homeTeam.crest}" alt="" style="width: 25px; vertical-align: middle; margin-right: 10px;">
                            <strong>${mecz.homeTeam.shortName || mecz.homeTeam.name}</strong>
                        </div>
                        
                        <div style="padding: 0 20px; text-align: center; min-width: 60px;">
                            <span style="background: #333; color: #fff; padding: 5px 10px; border-radius: 4px; font-weight: bold;">
                                ${mecz.score.fullTime.home ?? 0} : ${mecz.score.fullTime.away ?? 0}
                            </span>
                            <br>
                            <small style="color: blue; font-size: 10px;">${mecz.status}</small>
                        </div>

                        <div style="flex: 1; text-align: left;">
                            <strong>${mecz.awayTeam.shortName || mecz.awayTeam.name}</strong>
                            <img src="${mecz.awayTeam.crest}" alt="" style="width: 25px; vertical-align: middle; margin-left: 10px;">
                        </div>
                    </div>
                `;
                container.appendChild(meczElement);
            });
        } catch (error) {
            container.innerHTML = '<p>Błąd pobierania danych. Spróbuj odświeżyć za chwilę.</p>';
            console.error("API Error:", error);
        }
    }

    zaladujMecze();
</script>
</body>
</html>
