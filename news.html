<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Connect - Mecze na Żywo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; }
        nav { background: #1e293b; padding: 1rem; color: white; display: flex; gap: 15px; align-items: center; }
        nav a { color: white; text-decoration: none; font-size: 0.9rem; }
        .news-container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; }
        .mecz-card { transition: transform 0.2s; }
        .mecz-card:hover { transform: scale(1.01); }
    </style>
</head>
<body>

<nav>
    <strong>⚽ Football Portal</strong>
    <a href="index.html">Home</a>
    <a href="projekt.html">Top 5 lig</a>
    <a href="news.html">Wiadomości</a>
    <a href="opinie.html">Mecze</a>
</nav>

<div class="news-container">
    <h2>Dzisiejsze Mecze</h2>
    <div id="football-news">
        <p style="text-align: center;">Ładowanie aktualnych meczów...</p>
    </div>
</div>

<script>
async function zaladujMecze() {
    const MY_TOKEN = 'f74f5a062c754c81866359ee05090ff3';
    const mainContainer = document.getElementById('football-news');
    const url = 'https://cors-anywhere.herokuapp.com/https://api.football-data.org/v4/matches';

    const topLeagues = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'CL']; // Premier League, La Liga, Bundesliga, Serie A, Ligue 1, Champions League

    try {
        const response = await fetch(url, { headers: { 'X-Auth-Token': MY_TOKEN } });
        const data = await response.json();

        if (!data.matches || data.matches.length === 0) {
            mainContainer.innerHTML = '<p style="text-align:center;">Brak meczów na dzisiaj.</p>';
            return;
        }

        mainContainer.innerHTML = ''; // Czyścimy loader

        // Słownik do grupowania meczów po nazwie ligi
        const grupyLigi = {};

        data.matches.forEach(mecz => {
            const ligaName = mecz.competition.name;
            if (!grupyLigi[ligaName]) {
                grupyLigi[ligaName] = [];
            }
            grupyLigi[ligaName].push(mecz);
        });

        // Iterujemy po stworzonych grupach
        for (const liga in grupyLigi) {
            const isTop = topLeagues.includes(grupyLigi[liga][0].competition.code);
            
            // Tworzymy nagłówek ligi
            const section = document.createElement('div');
            section.innerHTML = `
                <div style="background: #e2e8f0; padding: 5px 15px; margin: 15px 0 10px 0; border-radius: 5px; font-weight: bold; color: #1e293b; display: flex; align-items: center; gap: 10px;">
                    <img src="${grupyLigi[liga][0].competition.emblem}" width="20" onerror="this.style.display='none'">
                    ${liga}
                </div>
            `;

            const matchesList = document.createElement('div');

            grupyLigi[liga].forEach(mecz => {
                matchesList.innerHTML += `
                    <div style="border: 1px solid #eee; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; background: #fff;">
                        <div style="flex: 1; text-align: right; font-size: 0.9rem;">
                            <strong>${mecz.homeTeam.shortName || mecz.homeTeam.name}</strong>
                            <img src="${mecz.homeTeam.crest}" width="25" style="vertical-align: middle; margin-left: 8px;">
                        </div>
                        <div style="padding: 0 15px; text-align: center; min-width: 70px;">
                            <span style="background: #1e293b; color: white; padding: 4px 8px; border-radius: 4px; font-weight: bold;">
                                ${mecz.score.fullTime.home ?? 0} : ${mecz.score.fullTime.away ?? 0}
                            </span>
                        </div>
                        <div style="flex: 1; text-align: left; font-size: 0.9rem;">
                            <img src="${mecz.awayTeam.crest}" width="25" style="vertical-align: middle; margin-right: 8px;">
                            <strong>${mecz.awayTeam.shortName || mecz.awayTeam.name}</strong>
                        </div>
                    </div>
                `;
            });

            // Jeśli to liga TOP 5, wrzucamy na początek, jeśli nie - chowamy do "Pozostałe"
            if (isTop) {
                mainContainer.appendChild(section);
                mainContainer.appendChild(matchesList);
            } else {
                const details = document.createElement('details');
                details.style.marginTop = "10px";
                details.innerHTML = `
                    <summary style="cursor: pointer; color: #64748b; font-size: 0.8rem; margin-bottom: 5px;">Pokaż mecze: ${liga}</summary>
                `;
                details.appendChild(matchesList);
                mainContainer.appendChild(details);
            }
        }

    } catch (error) {
        mainContainer.innerHTML = '<p>Błąd pobierania danych. Sprawdź połączenie.</p>';
        console.error(error);
    }
}
zaladujMecze();
</script>
</body>
</html>
